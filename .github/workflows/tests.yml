name: contract-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # shellcheck is preinstalled on ubuntu-latest runners. Scoped to --severity=error so
      # the job flags genuine bugs (undefined vars, broken redirections) without failing on
      # the long tail of style warnings. Tighten to `warning` once the tree is clean.
      - name: Run shellcheck on skill scripts and tests
        run: |
          shellcheck --version
          files=$(find skills tests hooks scripts -name '*.sh' -type f | sort)
          echo "Linting:"; echo "$files" | sed 's/^/  /'
          # shellcheck SC1091 (can't follow non-constant source) is expected for the
          # BASH_SOURCE-resolved shared emitters; exclude it.
          shellcheck --severity=error --exclude=SC1091 $files

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # node and python3 are preinstalled on ubuntu-latest; install php + xmllint.
      - name: Install php-cli and xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends php-cli libxml2-utils

      - name: Tool versions
        run: |
          bash --version | head -1
          php --version | head -1
          python3 --version
          node --version
          xmllint --version 2>&1 | head -1

      - name: Run contract test harness
        run: bash tests/run-all.sh
