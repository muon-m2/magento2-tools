name: contract-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # node and python3 are preinstalled on ubuntu-latest; install php + xmllint.
      - name: Install php-cli and xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends php-cli libxml2-utils

      - name: Tool versions
        run: |
          bash --version | head -1
          php --version | head -1
          python3 --version
          node --version
          xmllint --version 2>&1 | head -1

      - name: Run contract test harness
        run: bash tests/run-all.sh
